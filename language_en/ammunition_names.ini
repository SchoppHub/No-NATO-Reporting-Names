[AmmunitionNames]
# ------------------ AAM ------------------
wp_aa-2a=R-3S,,IR AAM,The Vympel R-3S (AA-2B Atoll) is a Soviet rear-aspect infrared homing air-to-air missile. It is a reverse-engineered copy of the American AIM-9B, with minor tweaks to construction and performance, and otherwise performs identically. Rear aspect only.
wp_aa-2c=R-3R,,SARH AAM,The R-3R (AA-2C Atoll) is a Soviet semi-active radar homing air-to-air missile. It is based on a reverse engineered AIM-9B but has an entirely different seeker, but otherwise shares the same poor acquisition and launch envelopes of the American progenitor.
wp_aa-2d=R-13M,,IR AAM,The R-13M (AA-2D Advanced Atoll D) is a Soviet infrared homing air-to-air missile. It is derived from the AA-2A Atoll (itself reverse engineered from the AIM-9) but features a new motor and seeker, vastly improving performance.
wp_aa-2-2=R-13M1,,IR AAM,The R-13M1 (AA-2D Advanced Atoll 2) is a Soviet infrared homing air-to-air missile. It is derived from the AA-2A Atoll (itself reverse engineered from the AIM-9) but features a new motor and seeker, vastly improving performance.
wp_aa-3e=R-8MR,,SARH AAM,The R-8MR (AA-3E Advanced Anab) is a Soviet semi-active radar homing air-to-air missile. One of a pair of Advanced Anab designs designed for the Su-15 and Yak-28P. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-3f=R-8MT,,IR AAM,The R-8MT (AA-3F Advanced Anab) is a Soviet built infrared homing air-to-air missile. One of a pair of Advanced Anab designs designed for the Su-15 and Yak-28P. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6a=R-40R,,AAM,The R-40R (AA-6A Acrid) is a Soviet long-range semi-active radar homing air-to-air missile. It was developed specifically for the MiG-25P interceptor to counter the XB-70 Valkyrie. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6b=R-40T,,IR AAM,The R-40T (AA-6B Acrid) is a Soviet long-range infrared homing air-to-air missile. It was developed specifically for the MiG-25P interceptor to counter the XB-70 Valkyrie. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6c=R-40RD,,AAM,The Vympel R-40RD (Improved AA-6C Acrid) is a Soviet long-range semi-active radar homing air-to-air missile. It was developed specifically for the new MiG-25PD interceptor. Maximum range of the missile was increased up to 60 km. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6d=R-40TD,,AAM,The Vympel R-40TD (Improved AA-6D Acrid) is a Soviet long-range infrared homing air-to-air missile. It was developed specifically for the new MiG-25PD interceptor. Maximum range of the missile was increased up to 60 km. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-7c=R-24R,,SARH AAM,The Vympel R-24R (AA-7C Apex) is a Soviet medium-range semi-active radar homing air-to-air missile. The updated Charlie and Delta variants were developed to equip the MiG-23 in the mid-1970s. Roughly analogous to the US AIM-7E, the AA-7C features a monopulse seeker with increased ECM resistance and lock-on-after-launch capability.
wp_aa-7d=R-24T,,IR AAM,The Vympel R-24T (AA-7D Apex) is a Soviet medium-range infrared homing air-to-air missile. The updated Charlie and Delta variants were developed to equip the MiG-23 in the mid-1970s. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-8=R-60M,,AAM,The Vympel R-60M (AA-8 Aphid) is a Soviet short-range infrared homing air-to-air missile. The weapon has been exported extremely widely and is likely to be commonly encountered in Soviet aligned states.
wp_aa-11=R-73,,AAM,The Vympel R-73A (AA-11 Archer) is a Soviet short-range infrared homing air-to-air missile. This is the top performing short-range missile in the Soviet arsenal, and remains extremely competitive compared to overseas competition, and represents an extremely lethal weapon at short range at all aspects.


# ------------------ SAM ------------------
wp_sa-n-1=M-1,Volna,SAM/ASuW,The M-1 Volna (SA-N-1 Goa) is the earliest Soviet naval surface-to-air missile system. It is intended to provide area air defence and a degree of protection from inbound anti-ship missiles. Originally only effective against high-flying air targets, later variants introduced an anti-surface capability and better capability to engage low-flying targets, as well as increased range.
wp_sa-n-1c=M-1,Volna-P,SAM/ASuW,The M-1 Volna-P (SA-N-1C) is modification of the earliest Soviet naval surface-to-air missile system. It has better resistance to jamming and chaff and capable of engaging low-flying targets.
wp_sa-n-3=M-11,Shtorm,SAM/ASuW,The 4K60 M-11 Shtorm (SA-N-3 Goblet) is a Soviet naval surface-to-air missile system. The system was installed on a number of missile cruiser classes and the Soviet Unions helicopter and STOVL carriers. It has a secondary anti-surface capability, and later versions improved performance against low-flying targets.
wp_sa-n-4=4K33,Osa-M,SAM/ASuW,The 4K33 Osa-M (SA-N-4 Gekko) is the naval version of the 9K33 Osa (SA-8 Gecko, note the different spelling) with two missiles on a retractable rotating launcher. It has been installed on a significant number of Soviet platforms to fulfil the short-range air defence role.
wp_sa-n-5=9K32,Strela-2,SAM,The 9K32 Strela-2 (SA-N-5 Grail) is a man-portable surface-to-air missile also known to NATO under the reporting name of SA-7 when used from land based launchers. On ships it is used as a point-defence system.
wp_sa-n-6=S-300F,Fort,SAM/ASuW,The S-300F Fort (SA-N-6 Grumble) is the naval version of the SA-10 (S-300P) land-based surface-to-air missile system. This powerful long-range system is fitted in Soviet missile-cruiser classes, and offers performance comparable to that of the SM-2. 
wp_sa-n-7=9S90,Uragan,SAM/ASuW,The 9S90 Uragan (SA-N-7A) is the naval version of the 9K37 Buk (SA-11 Gadfly) land-based surface-to-air missile system. The SA-N-7 system is a sophisticated and capable weapon system and made its entry to service on the Sovremenny-class destroyers.
wp_sa-n-9=3K95,Kinzhal,SAM/ASuW,The 3K95 Kinzhal (SA-N-9 Gauntlet) is the naval version of the 9K330 Tor (SA-15 Gauntlet) missile system. It utilises the same missile as the SA-15 and is fitted on a significant number of Soviet major surface combatants.

wp_sa-2=S-75,Dvina,SAM,The S-75 Dvina (SA-2 Guideline) is a Soviet long-range surface-to-air missile system. The system is intended to counter bombers over large areas and has been widely exported, having been used in many conflicts but most famously during the Vietnam war.
wp_sa-3=S-125,Neva,SAM,The S-125 Neva (SA-3 Goa) is a Soviet medium-range surface-to-air missile system. The system is intended to counter more manoeuvrable and lower altitude targets.
wp_sa-4=2K11,Krug,SAM,The 2K11 Krug (SA-4 Ganef) is a Soviet mobile medium-range surface-to-air missile system. The system is intended to counter bombers over large areas.
wp_sa-5=S-200A,Angara,SAM,The S-200A Angara (SA-5A Gammon) is a Soviet long-range surface-to-air missile system. The system is intended to counter high-altitude bombers over large areas. The missiles incorporate a home-on-jam capability.
wp_sa-6=2K12,Kub,SAM,The 2K12 Kub (SA-6 Gainful) is a Soviet mobile surface-to-air missile system. The system is intended to counter short-range threats out to approximately 15 miles.
wp_sa-8=9K33M3,Osa,SAM,The 9K33M3 Osa (SA-8 Gecko) is a Soviet mobile surface-to-air missile system. The system is intended to provide short-range air defense for tank and motorized divisions.
wp_sa-11=9K37,Buk,SAM,The 9K37 Buk (SA-11 Gadfly) is a Soviet mobile surface-to-air missile system. The system is intended to counter short-range threats out to approximately 18 miles.
wp_sa-13=9K35,Strela-10,SAM,The 9K35 Strela-10 (SA-13 Gopher) is a Soviet highly mobile short-range surface-to-air missile system. The system is intended to counter low-altitude pop-up threats such as helicopters.

# ---------- Anti-radar Missiles ---------
wp_as-11=Kh-58U,,ARM,The Kh-58U (AS-11 Kilter) is a Soviet anti-radiation missile developed to equip the Su-24M attack aircraft. This is one of the most advanced ARMs for the Soviet air forces, and has a very long range when fired at supersonic speeds. The U Variant is a development of the first Kh-58 missile, featuring longer range and lock-on-after-launch capability.
wp_as-12=Kh-25MP,,ARM,The Kh-25MP (AS-12 Kegler) is a Soviet air launched supersonic medium-range anti-radar missile. This is the most common ARM in Soviet service, and is roughly analogous to the American AGM-45 Shrike.

wp_as-2b=K-10SP,,ASM,K-10SP (As-2B Kipper) is a variant of K-10S missile which exchanges warhead fo Azaliya jammer system

# ---------- Anti-ship Missiles ----------
wp_as-2=K-10S,,ASM,The K-10S (AS-2 Kipper) is a Soviet air launched supersonic standoff anti-ship weapon designed to be carried by the Tu-16. Roughly analogous to an air-launched SS-N-3, it suffers much the same drawbacks against even moderately modern air defences.
wp_as-4=Kh-22,,ASM,The Kh-22 (AS-4 Kitchen) is a Soviet air launched supersonic standoff anti-ship weapon carried by the Tu-22M or Tu-95. It flies a high-altitude, high-speed profile with a supersonic terminal dive, making it very hard to counter.
wp_as-6=Kh-26,,ASM,The Kh-26 (AS-6 Kingfish) is a Soviet air launched supersonic standoff strike and anti-ship weapon designed to be carried by the Tu-16. A smaller cousin of the AS-4, it flies a high-altitude, high-speed profile with a supersonic terminal dive, making it very hard to counter.
wp_as-7=Kh-23,Grom,ASM,The Kh-23 Grom (AS-7 Kerry) is a Soviet air launched supersonic standoff strike weapon. It relies on an operator manually guiding the missile, similar to the US AGM-12 Bullpup, and features much of the same drawbacks.
wp_as-10=Kh-25ML,,ASM,The Kh-25ML (AS-10 Karen) is a Soviet air launched supersonic standoff strike weapon. It uses a laser seeker for fire-and-forget capability.
wp_as-13=Kh-59,Ovod,ASM,The Kh-59 Ovod (AS-13 Kingbolt) is a Soviet air launched subsonic standoff strike weapon. It flies the midcourse under inertial guidance, using pre-programmed target coordinates, with a terminal TV homing phase.
wp_as-14a=Kh-29L,,ASM,The Kh-29L (AS-14A Kedge) is a Soviet air launched supersonic air to surface missile, with a heavy warhead and laser guidance.
wp_as-14b=Kh-29T,,ASM,The Kh-29T (AS-14B Kedge) is a Soviet air launched supersonic air to surface missile, with a heavy warhead and TV guidance for longer range, but has degraded performance at night.

wp_ss-n-2=P-15,Termit,ASM,The 4K40 P-15 Termit (SS-N-2A Styx) is a Soviet surface launched subsonic standoff anti-ship weapon. The weapon was licence produced by China as the well known CSS-C-2 Silkworm. It also can be used to attack land installation on the shore.
wp_ss-n-2c=P-15M,Termit-R,ASM,The 4K40 P-15M Termit-R (SS-N-2C Styx) is a Soviet surface launched subsonic standoff anti-ship weapon. It is an improved version of original P-15 with extended range and better ECCM. It also can be used to attack land installation on the shore.
wp_ss-n-3=P-5,Pityorka,ASM,The 9K34 P-5 Pityorka (SS-N-3 Shaddock) is a Soviet surface launched subsonic standoff anti-ship weapon. While it was fearsome at the time of introduction, the subsonic, high-altitude flight profile makes it very vulnerable to surface-to-air missiles. Another drawback is the need for the launch platform to stay in contact with the missile during the entire flight, which means submerged platforms have to stay exposed on the surface during a strike, leaving them vulnerable to counterattacks.
wp_ss-n-3b=P-35,Redut,ASM,The P-35 Redut (SS-N-3B Sepal) is a Soviet surface launched subsonic standoff anti-ship weapon. It is an improved version of original P-5 missile with lower flight altitude and better resistance to jamming and chaff.
wp_ss-n-7=P-70,Ametist,ASM,The 4K66 P-70 Ametist (SS-N-7 Starbright) is a Soviet submarine launched transonic standoff anti-ship weapon. It was the first missile system in the world to be launched from a submerged submarine. It is a relatively short-ranged weapon, and was replaced by the 4K85 P-120 Malakhit.
wp_ss-n-9=P-120,Malakhit,ASM,The 4K85 P-120 Malakhit (SS-N-9 Siren) is a Soviet surface launched subsonic standoff anti-ship weapon. It is faster and longer-ranged than the Termit, and can perform evasive manuevers in the terminal phase.
wp_ss-n-12=P-500,Bazalt,ASM,The 4K80 P-500 Bazalt (SS-N-12 Sandbox) is a Soviet surface launched supersonic standoff anti-ship weapon designed to replace the P-35 Redut. Compared to the Redut, it is much faster, and incorporates an inter-missile data-link that allows the majority of the salvo to stay at a low altitude while a single missile flies high acting as a target spotter. It also carries defensive ECM to increase survivability against anti-air defences.
wp_ss-n-19=P-700,Granit,ASM,The 3M45 P-700 Granit (SS-N-19 Shipwreck) is a Soviet surface launched supersonic standoff anti-ship weapon. It flies a HI-LO profile and includes an advanced inter-missile datalink that allows several missiles in a salvo to distribute targets between them using a single missile as a high-flying spotter. It is capable of evasive manuevers in the terminal phase, carries an onboard ECM jammer and decoys, and is armored against CIWS fire and missile fragments. This is a fearsome weapon by any metric.
wp_ss-n-22=P-270,Moskit,ASM,The 3M80 P-270 Moskit (SS-N-22 Sunburn) is a Soviet surface launched supersonic standoff anti-ship weapon. It flies a LO-LO profile with a supersonic sea-skimming terminal phase, during which the missile performs evasive snaking manuevers to increase survivability against air defences.

#----------- Land Strike only missiles---------
wp_as-4b=Kh-22MP,Burja,Land Attack,The Kh-22MP Burja (AS-4C Kitchen) is a Soviet made supersonic anti-radiation missile. 
wp_at-6=9M114,Kokon,Land Attack,The 9M114 Kokon (AT-6 Spiral) is a Soviet supersonic anti tank guided missile used by some attack helicopters, particularly the Ka-29 and Mi-24. Notably features long range, high speed, and a powerful warhead.
wp_at-10=9K116,Kastet,Land Attack,The 9K116 Kastet (AT-10 Stabber) is a Soviet anti tank guided missile used by T-55M tank.

# ---------- Anti-sub  Missilies ----------
wp_apr-2=APR-2,,ASW,The APR-2 is a Soviet air-dropped anti-submarine torpedo, with a seeker range of 0.75 nautical miles and can be used to a depth of 600m.
wp_ss-n-14a=UPRK-3,Metel,ASW,The 83RU UPRK-3 Metel (SS-N-14 Silex) is a Soviet anti-submarine standoff weapon. Similar to the Australian Ikara these weapons carry an torpedo below a small cruise-missile airframe.
wp_ss-n-14b=UPRK-5,Rastrub,ASW/ASuW,The 85RU UPRK-5 Rastrub (SS-N-14 Silex-B) is a Soviet dual-purpose anti-submarine and anti-surface standoff weapon. Similar to the Australian Ikara these weapons carry an torpedo below a small cruise-missile airframe.
wp_ss-n-16=RPK-6,Vodopad,ASW,The 83RN RPK-6 Vodopad (SS-N-16 Stallion) is a Soviet submarines anti-submarine standoff weapon. It flies a ballistic trajectory to drop a torpedo in the vicinity of the target.

# ------------------ RBU ------------------
wp_rgb-10=RBU-1000,,ASW Mortar,The RBU-1000 (or Smerch-3) is a 300 mm Soviet anti-submarine rocket launcher. The RBU-1000 has a range of approximately 1000 yards.
wp_rgb-12=RBU-1200,,ASW Mortar,The RBU-1200 (or Smerch-3) is a 251 mm Soviet anti-submarine rocket launcher. The RBU-1200 has a range of approximately 1200 yards.
wp_rgb-25=RBU-2500,,ASW Mortar,The RBU-2500 (or Smerch-1) is a 213 mm Soviet anti-submarine rocket launcher. The RBU-2500 has a range of approximately 2500 yards.
wp_rgb-60=RBU-6000,,ASW Mortar,The RBU-6000 (or Smerch-2) is a 213 mm Soviet anti-submarine rocket launcher. The RBU-6000 has a range of approximately 6000 yards.

# --------------- Torpedoes ---------------
wp_45-36nu=45-36NU,,ASuW Torpedo,The 45-36NU is an obsolete, pre-WWII designed 450mm straight running torpedo heavily influenced by Italian 45-F and 53-F designs from early 1930s. Lightweight and packing a smaller punch than 530mm counterparts it is become quite ineffective weapon by 1950s. But sometimes you have to do with what you get.
wp_53-38=53-38,,ASuW Torpedo,The 53-38 is a WWII vintage Soviet heavyweight straight running torpedo. These torpedoes are relatively simple and therefore reliable and effective. The two deadliest sinkings in history (the German transport Wilhelm Gustloff and the troop transport Goya) were performed by two Soviet submarines using 53-38s.
wp_53-39=53-39,,ASuW Torpedo,The 53-39 is a WWII vintage Soviet heavyweight straight running torpedo. These torpedoes are relatively simple and therefore reliable and effective.
wp_53-56v=53-56,,ASuW Torpedo,The 53-56V is a Soviet heavyweight straight running torpedo. These torpedoes are updated variants of the 53-38.
wp_53-65K=53-65K,,WH Torpedo,The 53-65 is a Soviet wake-homing heavyweight torpedo designed to destroy surface ships.
wp_65-76=65-76,,WH Torpedo,The 65-76 is a Soviet 650mm wake-homing torpedo known as a carrier killer. It was developed specifically for use against extremely large targets such as super-carriers. Its larger 650 mm diameter means only some submarines can carry it.
wp_at-1=AT-1,,ASW Torpedo,The AT-1 is a Soviet electrical air-dropped anti-submarine torpedo with active/passive acoustic guidance carried only by helicopters.
wp_at-2=AT-2,,ASW Torpedo,The AT-2 is a Soviet electrical heavy-weight anti-submarine air-launched torpedo with active/passive acoustic guidance. The AT-2 is one of the few air-launched heavyweight torpedoes as the majority of the air-launched torpedoes are much smaller and only a quarter of the weight.
wp_set-40=SET-40,,ASW Torpedo,The SET-40 is a Soviet lightweight electrical anti-submarine torpedo with active/passive sonar guidance.
wp_set-65=SET-65,,ASW Torpedo,The SET-65 is a Soviet heavyweight electrical anti-submarine torpedo with active sonar guidance.
wp_test-71=TEST-71,,ASW Torpedo,The TEST-71 is a Soviet heavyweight anti-submarine wire-guided torpedo. It improves on the SET-65 with more advanced active/passive homing capabilities.
wp_umgt-1=UMGT-1,,ASW Torpedo,The UMGT-1 is a Soviet air dropped anti-submarine torpedo which also serves as the payload for the SS-N-14 and SS-N-16 ASW missiles. These lightweight torpedoes pack less of a punch than Soviet heavyweight torpedoes but are still extremely dangerous.
wp_uset-80=USET-80,,Torpedo,The USET-80 is a modern Soviet dual-purpose torpedo. It has an active/passive homing system making this an extremely dangerous weapon to contend with for both submarines and surface ships.

# ------------------ Bombs -----------------
wp_fab-100=OFAB-100,,Bomb,The OFAB-100-120 Soviet-designed 100 kg (220 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. 
wp_fab-250=FAB-250,,Bomb,The FAB-250 is a Soviet-designed 250 kg (550 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies.
wp_fab-500=FAB-500 M-62,,Bomb,The FAB-500 is a Soviet-designed 500 kg (1100 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. 
wp_fab-500_m54=FAB-500 M-54,,Bomb,The FAB-500 is a Soviet-designed 500 kg (1100 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is a shorter, medium drag bomb meant to be carried in larger quantities, usually internally, but suffers from worse accuracy over the low-drag model.

wp_kab-500l=KAB-500L,,Guided Bomb,The KAB-500L is a Soviet-designed 500 kg (1100 lb) laser-homing air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is based off the FAB-500, but with a laser seeker and fins for guidance.

wp_rbk-250=RBK-250,,Cluster Bomb,The RBK-250 is a Soviet 250 kg (550 lb) cluster bomb.
wp_rbk-500=RBK-500,,Cluster Bomb,The RBK-500 is a Soviet 500 kg (1100 lb) cluster bomb.

wp_plab-100=PLAB-100,,Depth Bomb,The PLAB-100 is Soviet-designed 100 kg (220 lb) anti submarine air-dropped bomb primarily used by the Soviet Union and its allies. 

# ---------------- Sonobuoys ---------------
wp_rgb-1=RGB-1,,Passive Sonobuoy,The RGB-1 is a passive-only omnidirectional sonobuoy used by the Soviet Union.
wp_rgb-nm1=RGB-NM-1,,Passive Sonobuoy,The RGB-NM-1 is a passive-only omnidirectional sonobuoy used as part of the Baku suite by the Soviet Union.
wp_rgb-3=RGB-3,,Active Sonobuoy,The RGB-3 is an active-only sonobuoy used by the Soviet Union.

# ------------------ FFAR -----------------
wp_s-5=S-5,,FFAR,The S-5 is a Soviet 55 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The S-5 can trace its heritage to the German R4M of the late WWII era. Th rocket is normally carried in pods of up to 32.
wp_s-8=S-8,,FFAR,The S-8 is a Soviet 80 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The S-8 has a number of different variants including specialist runway denial variants. The rocket is normally carried in pods of up to 20.
wp_s-24=S-24,,FFAR,The S-24 is a Soviet 240 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. Unlike most of FFAR it is carried singularly.
wp_s-25=S-25,,FFAR,The S-25 is a Soviet 266 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The largest of the Soviet Unions unguided rockets the S-25 has a warhead containing nearly 60kg of explosives and is carried singularly.

# ------------------ MLRS -----------------
wp_grad=Grad,,MLRS,The M-21OF Rocket is a Soviet weapon fired from the BM-21 launch vehicle. The complete system (the M-21) is more commonly known as the "Grad" Multiple Launched Rocket System. 

