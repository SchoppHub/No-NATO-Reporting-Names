#---------- ELINT ----------

Stop_Light=Stop Light ESM|The Nakat suite (NATO Reporting name: Stop Light) is an early Soviet ESM system found on the first generation of Soviet submarines. While it has poor accuracy and low sensitivity, it can pick up a relatively wide range of radar bands.
Watch_dog=Watch Dog ESM|The Nakat-M suite (NATO Reporting name: Stop Light) is an early Soviet ESM system found on the first generation of Soviet submarines. While it has poor accuracy and low sensitivity, it can pick up a relatively wide range of radar bands.
Zaliv=Bell Nest ESM|The MRP-10/11/12/13/14 Zaliv (NATO Reporting name: Bell Nest) is a 1960s Soviet ELINT and threat warning system used on many surface ships, and is associated with a family of ESM and ECM systems in a variety of different installations. This is the surface ship model, and features good sensitivity, albeit with slow identification speed.
Brick_Pulp=Brick Pulp ESM|The MRP-21 Zaliv-P (NATO Reporting name: Brick Pulp) is a Soviet ELINT system used on 2nd generation submarines, and features advances in signal processing for longer range and more accurate direction finding, alongside faster identification compared to earlier ESM sets.
Bald_Head=Bald Head ELINT|The MRP-23 (NATO Reporting name: Bald Head) is a Soviet ELINT system used on the Alfa and Oscar class nuclear submarines, and is a unique combined radar and ESM system, with good accuracy and very good sensitivity, allowing for over-the-horizon missile shots.
Squid_Head=Squid Head ELINT|The MRP-25 (NATO Reporting name: Squid Head) is a Soviet ELINT system used on the Kilo and Tango class submarines, and is optimized for threat warning capabilities, and is a lightweight derivative of the Bald Head ELINT system.

Start_ESM=Bell Shroud ESM|An ESM component of "Start" suite
Koltso=Rum Tub ESM|"MP-404" (NATO Reporting name: Rum Tub) is a passive over-the-horizon fire control system for the SS-N-12 Sandbox and SS-N-19 Shipwreck missile systems used on the Kirov-,Kiev- and Slava classes.
Band_Stand_ESM=Band Stand ESM|"Monolit" (NATO Reporting name: Band Stand) is an over-the-horizon fire control radar for the SS-N-9 Siren and SS-N-22 Sunburn missile systems used on the Sovremenny- and Nanuchka classes.
Plank_Shave_ESM=Plank Shave ESM|3Ts-25 "Garpun" (NATO reporting name: Plank Shave) is an over-the-horizon radar for the "Rubezh" movile anti-ship land launcher with the SS-N-2 Styx (P-15M "Termit") missiles.

